{% include base_path %}

<div style="
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  width:100%;
">

  <!-- Left: Social Links -->
  <div class="page__footer-follow" style="
    flex:1;
    min-width:0;
  ">
    <ul class="social-icons" style="
      margin:0;
      padding:0;
      list-style:none;
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:4px 12px;
      line-height:1.2;
      font-size:0.9rem;
    ">
      {% if site.data.ui-text[site.locale].follow_label %}
        <li><strong>{{ site.data.ui-text[site.locale].follow_label }}</strong></li>
      {% endif %}

      {% if site.author.github %}
        <li>
          <a href="https://github.com/{{ site.author.github }}">
            <i class="fab fa-github" aria-hidden="true"></i> GitHub
          </a>
        </li>
      {% endif %}

      <li>
        <a href="/sitemap/">Sitemap</a>
      </li>
    </ul>
  </div>

  <!-- Right: Visitor Map -->
  <div style="
    flex:0 0 100px;
    width:100px;
    height:45px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  ">
    <script
      async
      defer
      type="text/javascript"
      id="mapmyvisitors"
      src="//mapmyvisitors.com/map.js?d=-ZOGce-E9AwLSiGOii8eBx-yuoOBs9ciGma5_af-tl8&cl=ffffff&w=a">
    </script>
  </div>

</div>
